<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MindOS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{width:360px;background:#fafafa}
.header{background:linear-gradient(135deg,#7c3aed,#4f46e5);padding:14px 18px;display:flex;align-items:center;gap:10px}
.hl{font-size:22px}
.ht{color:#fff;font-size:17px;font-weight:700}
.hs{color:rgba(255,255,255,.7);font-size:11px}
.screen{display:none;padding:18px}
.screen.active{display:block}
label{font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;display:block}
input,select{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:10px;outline:none;background:#fff}
input:focus,select:focus{border-color:#7c3aed}
.btn{width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;margin-bottom:8px}
.bp{background:#7c3aed;color:#fff}
.bp:disabled{opacity:.6}
.bs{background:#f3f4f6;color:#374151}
.bd{background:#fee2e2;color:#dc2626}
.sbox{background:#f5f3ff;border:1.5px solid #ddd6fe;border-radius:8px;padding:10px;margin-bottom:12px;max-height:90px;overflow-y:auto}
.sl{font-size:10px;font-weight:600;color:#7c3aed;text-transform:uppercase;margin-bottom:5px}
.st{font-size:12px;color:#374151;line-height:1.5}
.nt{font-size:12px;color:#9ca3af;text-align:center;padding:8px 0}
.msg{padding:9px 12px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:10px;text-align:center;border:1.5px solid}
.ms{background:#f0fdf4;color:#166534;border-color:#bbf7d0}
.me{background:#fef2f2;color:#991b1b;border-color:#fecaca}
.mi{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.mw{background:#fffbeb;color:#92400e;border-color:#fde68a}
.card{background:#fff;border:1.5px solid #ede9fe;border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer}
.card.flipped{background:#7c3aed;border-color:#7c3aed}
.cq{font-size:12px;font-weight:600;color:#374151}
.card.flipped .cq{color:rgba(255,255,255,.8);font-size:10px}
.ca{font-size:12px;color:#fff;margin-top:5px;display:none}
.card.flipped .ca{display:block}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:20px;font-weight:600;margin-top:4px}
.be{background:#dcfce7;color:#16a34a}
.bm{background:#fef9c3;color:#ca8a04}
.bh{background:#fee2e2;color:#dc2626}
.cl{max-height:260px;overflow-y:auto}
.footer{text-align:center;padding:10px;border-top:1px solid #f3f4f6;font-size:11px;color:#9ca3af}
</style>
</head>
<body>
<div class="header">
  <div class="hl">&#x1F9E0;</div>
  <div><div class="ht">MindOS</div><div class="hs">AI Flashcard Maker</div></div>
</div>

<div id="screen-login" class="screen active">
  <p style="font-size:13px;color:#6b7280;text-align:center;margin-bottom:14px">Login karo!</p>
  <label>Email</label>
  <input type="email" id="login-email" placeholder="email@example.com"/>
  <label>Password</label>
  <input type="password" id="login-password" placeholder="password"/>
  <div id="login-message"></div>
  <button class="btn bp" id="btn-login">&#x1F680; Login Karo</button>
</div>

<div id="screen-main" class="screen">
  <div class="sbox">
    <div class="sl">Selected Text</div>
    <div id="selected-text" class="nt">Webpage pe text select karo!</div>
  </div>
  <select id="subject-select">
    <option value="">-- Subject --</option>
    <option value="Computer Science">Computer Science</option>
    <option value="Mathematics">Mathematics</option>
    <option value="Physics">Physics</option>
    <option value="Chemistry">Chemistry</option>
    <option value="Biology">Biology</option>
    <option value="History">History</option>
    <option value="Economics">Economics</option>
    <option value="Other">Other</option>
  </select>
  <div id="main-message"></div>
  <button class="btn bp" id="btn-generate">&#x2728; Flashcards Banao</button>
  <button class="btn bs" id="btn-refresh">&#x1F504; Text Refresh</button>
  <button class="btn bd" id="btn-logout">&#x1F44B; Logout</button>
</div>

<div id="screen-cards" class="screen">
  <div id="cards-list" class="cl"></div>
  <button class="btn bp" id="btn-open-app">&#x1F310; App Kholo</button>
  <button class="btn bs" id="btn-back">&#x2190; Wapas</button>
</div>

<div class="footer">MindOS - Padho, Samjho, Yaad Rakho</div>
<script src="popup.js"></script>
</body>
</html>
