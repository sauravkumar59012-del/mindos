<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindOS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,sans-serif; }
body { width:380px; min-height:200px; background:#fafafa; }
.header { background:linear-gradient(135deg,#7c3aed,#4f46e5); padding:16px 20px; display:flex; align-items:center; gap:10px; }
.header-logo { font-size:24px; }
.header-title { color:white; font-size:18px; font-weight:700; }
.header-sub { color:rgba(255,255,255,0.7); font-size:11px; }
.screen { display:none; padding:20px; }
.screen.active { display:block; }
label { font-size:12px; font-weight:600; color:#374151; margin-bottom:6px; display:block; }
input, select { width:100%; border:1.5px solid #e5e7eb; border-radius:10px; padding:10px 14px; font-size:13px; margin-bottom:12px; outline:none; background:white; }
input:focus, select:focus { border-color:#7c3aed; }
.btn { width:100%; padding:11px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; border:none; transition:all 0.2s; margin-bottom:8px; }
.btn-primary { background:#7c3aed; color:white; }
.btn-primary:hover { background:#6d28d9; }
.btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
.btn-secondary { background:#f3f4f6; color:#374151; }
.btn-danger { background:#fee2e2; color:#dc2626; }
.selected-box { background:#f5f3ff; border:1.5px solid #ddd6fe; border-radius:10px; padding:12px; margin-bottom:14px; max-height:100px; overflow-y:auto; }
.selected-label { font-size:10px; font-weight:600; color:#7c3aed; text-transform:uppercase; margin-bottom:6px; }
.selected-text { font-size:12px; color:#374151; line-height:1.5; }
.no-text { font-size:12px; color:#9ca3af; text-align:center; padding:10px 0; }
.message { padding:10px 14px; border-radius:10px; font-size:12px; font-weight:500; margin-bottom:12px; text-align:center; border:1.5px solid; }
.msg-success { background:#f0fdf4; color:#166534; border-color:#bbf7d0; }
.msg-error { background:#fef2f2; color:#991b1b; border-color:#fecaca; }
.msg-info { background:#eff6ff; color:#1e40af; border-color:#bfdbfe; }
.msg-warn { background:#fffbeb; color:#92400e; border-color:#fde68a; }
.card { background:white; border:1.5px solid #ede9fe; border-radius:10px; padding:12px; margin-bottom:8px; cursor:pointer; }
.card.flipped { background:#7c3aed; border-color:#7c3aed; }
.card-q { font-size:12px; font-weight:600; color:#374151; }
.card.flipped .card-q { color:rgba(255,255,255,0.8); font-size:10px; }
.card-a { font-size:12px; color:white; margin-top:6px; display:none; }
.card.flipped .card-a { display:block; }
.badge { display:inline-block; font-size:9px; padding:2px 8px; border-radius:20px; font-weight:600; margin-top:4px; }
.badge-easy { background:#dcfce7; color:#16a34a; }
.badge-medium { background:#fef9c3; color:#ca8a04; }
.badge-hard { background:#fee2e2; color:#dc2626; }
.cards-list { max-height:280px; overflow-y:auto; }
.footer { text-align:center; padding:10px; border-top:1px solid #f3f4f6; font-size:11px; color:#9ca3af; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">🧠</div>
  <div>
    <div class="header-title">MindOS</div>
    <div class="header-sub">AI Flashcard Maker</div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="screen-login" class="screen active">
  <p style="font-size:13px;color:#6b7280;text-align:center;margin-bottom:16px">
    MindOS account se login karo!
  </p>
  <label>Email</label>
  <input type="email" id="login-email" placeholder="rahul@example.com"/>
  <label>Password</label>
  <input type="password" id="login-password" placeholder="••••••••"/>
  <div id="login-message"></div>
  <button class="btn btn-primary" id="btn-login">🚀 Login Karo</button>
</div>

<!-- MAIN SCREEN -->
<div id="screen-main" class="screen">
  <div class="selected-box">
    <div class="selected-label">📋 Selected Text</div>
    <div id="selected-text" class="no-text">
      Webpage pe kuch text select karo!
    </div>
  </div>
  <select id="subject-select">
    <option value="">-- Subject select karo --</option>
    <option value="Computer Science">Computer Science</option>
    <option value="Mathematics">Mathematics</option>
    <option value="Physics">Physics</option>
    <option value="Chemistry">Chemistry</option>
    <option value="Biology">Biology</option>
    <option value="History">History</option>
    <option value="Economics">Economics</option>
    <option value="Other">Other</option>
  </select>
  <div id="main-message"></div>
  <button class="btn btn-primary" id="btn-generate">✨ Flashcards Generate Karo</button>
  <button class="btn btn-secondary" id="btn-refresh">🔄 Text Refresh Karo</button>
  <button class="btn btn-danger" id="btn-logout">👋 Logout</button>
</div>

<!-- CARDS SCREEN -->
<div id="screen-cards" class="screen">
  <div id="cards-list" class="cards-list"></div>
  <button class="btn btn-primary" id="btn-open-app">🌐 MindOS App Kholo</button>
  <button class="btn btn-secondary" id="btn-back">← Wapas Jao</button>
</div>

<div class="footer">MindOS — Padho, Samjho, Yaad Rakho 🧠</div>

<script src="popup.js"></script>
</body>
</html>
